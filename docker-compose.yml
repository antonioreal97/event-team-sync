version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: frela_postgres
    environment:
      POSTGRES_DB: frela_db
      POSTGRES_USER: frela_user
      POSTGRES_PASSWORD: frela_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - frela_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frela_user -d frela_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: frela_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@frela.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frela_network

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: frela_server
    ports:
      - "3001:3001"
    env_file:
      - config.docker.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frela_network
    volumes:
      - ./server:/app/server
      - ./database:/app/database
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: frela_web
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - frela_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  frela_network:
    driver: bridge
